<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grapes — La Mappa del vino vero</title>
  <meta name="description" content="La mappa delle cantine vere d'Italia: naturali, biodinamiche, eroiche. Scoprile sul territorio e compra i loro vini direttamente, al prezzo di cantina." />
  <meta name="referrer" content="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ---- Layout mappa ---- */
    body { overflow: hidden; }
    .map-shell { display: grid; grid-template-columns: 400px 1fr; height: calc(100vh - 66px); }
    .map-side { background: var(--crema); border-right: 1px solid var(--bordo); display: flex; flex-direction: column; overflow: hidden; }
    .ms-head { padding: 16px 18px 10px; border-bottom: 1px solid var(--bordo); }
    .ms-head h1 { font-size: 21px; margin: 0 0 2px; color: var(--bordeaux-ink); font-weight: 600; }
    .ms-head p { margin: 0 0 10px; font-size: 12.5px; color: var(--grigio); }
    .ms-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .ms-filters .chip { padding: 5px 11px; font-size: 11.5px; }
    .ms-count { font-family: var(--sans); font-size: 11.5px; color: var(--grigio); font-weight: 600; padding: 8px 18px; border-bottom: 1px solid var(--bordo); background: #fff; }
    .ms-list { flex: 1; overflow-y: auto; padding: 10px 12px; }
    .pl-card {
      display: flex; gap: 10px; background: #fff; border: 1px solid var(--bordo);
      border-radius: 12px; padding: 10px; margin-bottom: 10px; cursor: pointer;
      transition: transform .12s, box-shadow .12s, border-color .12s;
    }
    .pl-card:hover, .pl-card.active { transform: translateY(-2px); box-shadow: var(--ombra-lg); border-color: var(--bordeaux-mid); }
    .pl-card img { width: 74px; height: 74px; border-radius: 9px; object-fit: cover; flex: none; }
    .pl-main { min-width: 0; }
    .pl-main h3 { margin: 0; font-size: 14.5px; color: var(--bordeaux-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-meta { font-size: 11px; font-weight: 700; color: var(--bordeaux-mid); margin: 1px 0 4px; }
    .pl-meta span { color: var(--grigio); font-weight: 500; }
    .pl-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .pl-badges .prac-badge { font-size: 9px; padding: 2px 7px; }
    .pl-from { font-size: 11px; color: var(--grigio); margin-top: 4px; }
    .pl-from b { color: var(--bordeaux-ink); font-family: var(--serif); font-size: 13px; }
    #map { height: 100%; }
    /* ---- Popup ---- */
    .leaflet-popup-content-wrapper { border-radius: 14px; box-shadow: var(--ombra-lg); font-family: var(--sans); }
    .leaflet-popup-content { margin: 0; width: 270px !important; }
    .pp { overflow: hidden; border-radius: 14px; }
    .pp img.pp-photo { width: 100%; height: 110px; object-fit: cover; display: block; }
    .pp-body { padding: 10px 13px 13px; }
    .pp-body h3 { margin: 0; font-family: var(--serif); font-size: 16px; color: var(--bordeaux-ink); }
    .pp-meta { font-size: 11px; font-weight: 700; color: var(--bordeaux-mid); margin: 1px 0 5px; }
    .pp-story { font-size: 11.5px; color: var(--grigio); line-height: 1.5; margin: 5px 0 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .pp-cta { display: flex; gap: 6px; }
    .pp-cta .btn { padding: 8px 11px; font-size: 11.5px; border-radius: 9px; flex: 1; text-align: center; }
    /* ---- Marker ---- */
    .wmark { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50% 50% 50% 4px; transform: rotate(-45deg); border: 2.5px solid #fff; box-shadow: 0 3px 10px rgba(46,10,18,.35); }
    .wmark span { transform: rotate(45deg); font-size: 15px; }
    .mk-default { background: var(--bordeaux); }
    .mk-naturale { background: #3f6b46; }
    .mk-biodinamica { background: #9a7016; }
    .mk-eroica { background: #54432e; }
    @media (max-width: 820px) {
      .map-shell { grid-template-columns: 1fr; grid-template-rows: 1fr 45vh; height: calc(100vh - 66px); }
      .map-side { order: 2; border-right: none; border-top: 1px solid var(--bordo); }
      #map { order: 1; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark">🍇</span>
        <span class="brand-text">Grapes<small data-i18n="brand_sub">dalla cantina alla tavola</small></span>
      </a>
      <nav class="nav-actions" style="margin-left:auto">
        <a class="btn ghost" href="/#cantine" data-i18n="nav_wineries">Le cantine</a>
        <a class="btn ghost" href="/#vini" data-i18n="nav_wines">I vini</a>
        <button class="btn ghost" id="langBtn">EN</button>
      </nav>
    </div>
  </header>

  <div class="map-shell">
    <aside class="map-side">
      <div class="ms-head">
        <h1 data-i18n="map_h1">La Mappa del vino vero</h1>
        <p data-i18n="map_p">Scopri le cantine sul territorio — poi compra diretto, senza muoverti.</p>
        <div class="ms-filters" id="msFilters"></div>
      </div>
      <div class="ms-count" id="msCount"></div>
      <div style="font-size:10px;color:var(--grigio);padding:5px 18px;border-bottom:1px solid var(--bordo);background:#fff" data-i18n="sources_note">Registro indipendente · fonti: elenchi soci pubblici VinNatur e ViniVeri</div>
      <div class="ms-list" id="msList"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/mappa.js"></script>
</body>
</html>
